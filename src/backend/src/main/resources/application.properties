spring.application.name=Fire-Palace-Ordering-Sys
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# HTTP port
server.port = 8080

# DataBase
spring.datasource.url=jdbc:mysql://yisurds-69ac4927bc29b0.rds.ysydb1.com:3306/fire?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=69ac4927bc29b03929:violet
spring.datasource.password=Violet12138
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
logging.level.com.zaxxer.hikari=DEBUG

# MyBatis
mybatis.mapper-locations=classpath:com/fire/firepalaceorderingsys/mapper/*.xml
mybatis.type-aliases-package=com.fire.firepalaceorderingsys.pojo
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis.configuration.map-underscore-to-camel-case=true

# pool-settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

logging.level.com.fire.firepalaceorderingsys=INFO

# logs
logging.file.path=logs
logging.file.name=logs/app.log
log.cleanup.enabled=true
log.cleanup.max-retries=5
log.cleanup.retry-delay-ms=200
log.cleanup.force-delete=true

# JWT Configuration
jwt.secret=fire-palace-ordering-sys-jwt-secret-key-for-token-generation
jwt.expiration=604800000

# Interceptor Configuration
auth.interceptor.enabled=true

# Aliyun OSS Configuration
aliyun.oss.endpoint=https://oss-cn-beijing.aliyuncs.com
aliyun.oss.bucket-name=fire-palace
aliyun.oss.region=cn-beijing

# File Upload Size Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
